<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作端末 - SITE A</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between p-6">

    <div class="text-center py-4 bg-white border border-gray-200 rounded-2xl shadow-sm">
        <h1 class="text-xs font-black text-gray-400 tracking-widest uppercase">Controller</h1>
        <p class="text-2xl font-black text-red-600">端末 A <span class="text-base text-gray-500 font-normal">（赤 担当）</span></p>
    </div>

    <div class="my-auto space-y-6">
        
        <button id="color-btn" class="w-full py-16 bg-white hover:bg-red-50 text-red-500 border-4 border-red-500 text-3xl font-black rounded-[2.5rem] shadow-lg transition-all transform active:scale-95 flex flex-col items-center justify-center space-y-2">
            <span class="text-5xl">🔴</span>
            <span>メイン画面を「赤」にする</span>
        </button>

        <button id="clear-btn" class="w-full py-8 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xl font-black rounded-3xl shadow-md transition transform active:scale-95">
            なし（薄く消す）
        </button>

    </div>

    <div class="text-center text-xs font-bold text-gray-400 py-2 border-t border-gray-200">
        現在の送信状態: <span id="status" class="text-gray-600">未接続（Firebase連携前）</span>
    </div>

    <script>
        const colorBtn = document.getElementById('color-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusText = document.getElementById('status');

        // 「赤にする」ボタンを押したとき
        colorBtn.addEventListener('click', () => {
            // 見た目を「ON状態」っぽくアクティブにする（テスト用）
            colorBtn.classList.toggle('bg-red-500');
            colorBtn.classList.toggle('text-white');
            
            if (colorBtn.classList.contains('bg-red-500')) {
                statusText.textContent = "「赤 ON」を送信しました（仮）";
                statusText.className = "text-red-600 font-black";
            } else {
                statusText.textContent = "「赤 OFF」を送信しました（仮）";
                statusText.className = "text-gray-600 font-bold";
            }
        });

        // 「なし」ボタンを押したとき
        clearBtn.addEventListener('click', () => {
            // 赤ボタンを強制OFFにする
            colorBtn.classList.remove('bg-red-500', 'text-white');
            statusText.textContent = "「なし（全消去）」を送信しました（仮）";
            statusText.className = "text-gray-500 font-black";
        });
    </script>
</body>
</html>
