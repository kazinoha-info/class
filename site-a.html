<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作端末 - SITE A</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔴ここにFirebaseの情報を貼り付ける
        const firebaseConfig = {https://classkikaku-e8e88-default-rtdb.firebaseio.com/
            apiKey: "AIzaSyA737hpRgZTnO0YMLAwZpVY1qTCwlkBf0c",
            authDomain: "classkikaku-e8e88.firebaseapp.com",
            databaseURL: "https://classkikaku-e8e88-default-rtdb.firebaseio.com",
            projectId: "classkikaku-e8e88",
            storageBucket: "classkikaku-e8e88.firebasestorage.app",
            messagingSenderId: "186126264620",
            appId: "1:186126264620:web:e865311f6e414e91492489"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const colorBtn = document.getElementById('color-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusText = document.getElementById('status');

        let isRedActive = false;

        // 赤ボタンを押した時
        colorBtn.addEventListener('click', () => {
            isRedActive = !isRedActive;
            
            // データベースの「site_a/red」の値をtrueまたはfalseに書き換える
            set(ref(db, 'site_a/red'), isRedActive).then(() => {
                if (isRedActive) {
                    colorBtn.classList.add('bg-red-500', 'text-white');
                    statusText.textContent = "赤 ON を送信中";
                    statusText.className = "text-red-600 font-black";
                } else {
                    colorBtn.classList.remove('bg-red-500', 'text-white');
                    statusText.textContent = "赤 OFF を送信中";
                    statusText.className = "text-gray-600 font-bold";
                }
            });
        });

        // なしボタンを押した時
        clearBtn.addEventListener('click', () => {
            isRedActive = false;
            colorBtn.classList.remove('bg-red-500', 'text-white');
            
            // データベースの値を強制的にfalseにする
            set(ref(db, 'site_a/red'), false).then(() => {
                statusText.textContent = "なし（解除）を送信中";
                statusText.className = "text-gray-500 font-black";
            });
        });
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-height-screen flex flex-col justify-between p-6">
    <div class="text-center py-4 bg-white border border-gray-200 rounded-2xl shadow-sm">
        <h1 class="text-xs font-black text-gray-400 tracking-widest uppercase">Controller</h1>
        <p class="text-2xl font-black text-red-600">端末 A <span class="text-base text-gray-500 font-normal">（赤 担当）</span></p>
    </div>
    <div class="my-auto space-y-6">
        <button id="color-btn" class="w-full py-16 bg-white hover:bg-red-50 text-red-500 border-4 border-red-500 text-3xl font-black rounded-[2.5rem] shadow-lg transition-all transform active:scale-95 flex flex-col items-center justify-center space-y-2">
            <span class="text-5xl">🔴</span>
            <span>メイン画面を「赤」にする</span>
        </button>
        <button id="clear-btn" class="w-full py-8 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xl font-black rounded-3xl shadow-md transition transform active:scale-95">
            なし（薄く消す）
        </button>
    </div>
    <div class="text-center text-xs font-bold text-gray-400 py-2 border-t border-gray-200">
        通信状態: <span id="status" class="text-gray-600">接続完了（通信可能）</span>
    </div>
</body>
</html>
