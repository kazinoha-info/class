<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 各端末から「ON」にされた時の色と、強力な発光エフェクト（ネオン風） */
        .color-red { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); }
        .color-yellow { border-color: #eab308; box-shadow: 0 0 30px rgba(234, 179, 8, 0.8); }
        .color-blue { border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
        
        /* 複数選択（同時押し）された時は、より派手な混合グラデーション枠に */
        .color-mixed { 
            border-color: transparent; 
            background-image: linear-gradient(#1f2937, #1f2937), linear-gradient(135deg, #ef4444, #eab308, #3b82f6); 
            background-origin: border-box; 
            background-clip: padding-box, border-box; 
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4); 
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-height-screen m-0 p-0 overflow-hidden relative">

    <div id="timeup-screen" class="hidden fixed inset-0 bg-red-700 flex flex-col justify-center items-center z-50 animate-pulse">
        <h1 class="text-9xl font-black tracking-widest text-white drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]">TIME UP！</h1>
        <button id="back-btn" class="absolute bottom-6 right-6 px-6 py-3 bg-gray-900/80 hover:bg-gray-900 text-sm font-bold rounded-lg border border-white/20 transition transform active:scale-95">
            戻る
        </button>
    </div>

    <div id="main-content" class="flex h-screen w-screen">
        
        <div class="w-1/3 flex flex-col justify-center items-center border-r border-gray-700 p-6 bg-gray-800 z-10">
            <div class="mb-6 bg-gray-700 p-1 rounded-lg flex space-x-2">
                <button id="mode-down-btn" class="px-4 py-2 rounded-md bg-blue-600 text-white font-bold text-sm transition">カウントダウン</button>
                <button id="mode-up-btn" class="px-4 py-2 rounded-md text-gray-400 hover:text-white font-bold text-sm transition">カウントアップ</button>
            </div>
            <div id="timer-display" class="text-8xl font-mono font-bold tracking-wider text-yellow-400 mb-4 select-none">00:10</div>
            <div class="flex items-center space-x-2 mb-10 text-base bg-gray-700 p-3 rounded-xl shadow-inner">
                <input id="input-minutes" type="number" min="0" max="999" value="0" class="w-14 bg-gray-800 text-center font-bold text-yellow-400 rounded p-1 focus:outline-none">
                <span class="text-gray-400 font-bold text-sm">分</span>
                <input id="input-seconds" type="number" min="0" max="59" value="10" class="w-14 bg-gray-800 text-center font-bold text-yellow-400 rounded p-1 focus:outline-none">
                <span class="text-gray-400 font-bold text-sm">秒</span>
                <button id="set-time-btn" class="ml-2 px-3 py-1 bg-gray-600 hover:bg-gray-500 text-xs font-bold rounded transition">設定</button>
            </div>
            <div class="flex space-x-4">
                <button id="start-pause-btn" class="w-32 py-3 bg-emerald-600 hover:bg-emerald-500 text-lg font-bold rounded-xl shadow-lg transition">開始</button>
                <button id="reset-btn" class="w-32 py-3 bg-rose-600 hover:bg-rose-500 text-lg font-bold rounded-xl shadow-lg transition">リセット</button>
            </div>
        </div>

        <div class="w-2/3 flex justify-center items-center p-8 bg-gray-900 relative">
            
            <div class="relative w-[650px] h-[550px]">
                
                <div id="card-a" class="absolute top-0 left-1/2 -translate-x-1/2 flex flex-col items-center bg-gray-800 border-4 border-gray-700 p-6 rounded-3xl w-60 shadow-2xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE A</span>
                    <div class="text-5xl font-mono font-black text-white tracking-wider">00:00</div>
                    
                    <div class="mt-4 pt-3 border-t border-gray-700 w-full text-center">
                        <p class="text-[10px] text-gray-500 mb-1.5 font-bold">【他端末からの色信号】</p>
                        <div class="flex justify-center gap-1">
                            <button onclick="toggleColor('a', 'red')" class="px-2 py-1 bg-red-600 text-[10px] rounded font-bold">赤 ON/OFF</button>
                            <button onclick="clearColor('a')" class="px-2 py-1 bg-gray-600 text-[10px] rounded font-bold">なし</button>
                        </div>
                    </div>
                </div>

                <div id="card-b" class="absolute bottom-0 left-0 flex flex-col items-center bg-gray-800 border-4 border-gray-700 p-6 rounded-3xl w-60 shadow-2xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE B</span>
                    <div class="text-5xl font-mono font-black text-white tracking-wider">00:00</div>
                    
                    <div class="mt-4 pt-3 border-t border-gray-700 w-full text-center">
                        <p class="text-[10px] text-gray-500 mb-1.5 font-bold">【他端末からの色信号】</p>
                        <div class="flex justify-center gap-1">
                            <button onclick="toggleColor('b', 'yellow')" class="px-2 py-1 bg-yellow-500 text-[10px] rounded font-bold text-black">黄 ON/OFF</button>
                            <button onclick="clearColor('b')" class="px-2 py-1 bg-gray-600 text-[10px] rounded font-bold">なし</button>
                        </div>
                    </div>
                </div>

                <div id="card-c" class="absolute bottom-0 right-0 flex flex-col items-center bg-gray-800 border-4 border-gray-700 p-6 rounded-3xl w-60 shadow-2xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE C</span>
                    <div class="text-5xl font-mono font-black text-white tracking-wider">00:00</div>
                    
                    <div class="mt-4 pt-3 border-t border-gray-700 w-full text-center">
                        <p class="text-[10px] text-gray-500 mb-1.5 font-bold">【他端末からの色信号】</p>
                        <div class="flex justify-center gap-1">
                            <button onclick="toggleColor('c', 'blue')" class="px-2 py-1 bg-blue-600 text-[10px] rounded font-bold">青 ON/OFF</button>
                            <button onclick="clearColor('c')" class="px-2 py-1 bg-gray-600 text-[10px] rounded font-bold">なし</button>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script>
        // --- メインタイマー制御 ---
        let timer = null; let isRunning = false; let mode = 'countdown'; let baseTime = 10; let currentTime = baseTime;
        const display = document.getElementById('timer-display');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeDownBtn = document.getElementById('mode-down-btn');
        const modeUpBtn = document.getElementById('mode-up-btn');
        const inputMinutes = document.getElementById('input-minutes');
        const inputSeconds = document.getElementById('input-seconds');
        const setTimeBtn = document.getElementById('set-time-btn');
        const timeupScreen = document.getElementById('timeup-screen');
        const backBtn = document.getElementById('back-btn');

        function updateDisplay() {
            const minutes = Math.floor(Math.abs(currentTime) / 60); const seconds = Math.floor(Math.abs(currentTime) % 60);
            display.textContent = (currentTime < 0 ? '-' : '') + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }
        function tick() {
            if (mode === 'countdown') { currentTime--; if (currentTime <= 0) { currentTime = 0; pauseTimer(); timeupScreen.classList.remove('hidden'); } } 
            else { currentTime++; } updateDisplay();
        }
        function pauseTimer() { clearInterval(timer); isRunning = false; startPauseBtn.textContent = '開始'; startPauseBtn.className = startPauseBtn.className.replace('bg-amber-600', 'bg-emerald-600'); }
        startPauseBtn.addEventListener('click', () => { if (isRunning) { pauseTimer(); } else { timer = setInterval(tick, 1000); startPauseBtn.textContent = '一時停止'; startPauseBtn.className = startPauseBtn.className.replace('bg-emerald-600', 'bg-amber-600'); isRunning = true; } });
        resetBtn.addEventListener('click', () => { pauseTimer(); currentTime = baseTime; updateDisplay(); });
        setTimeBtn.addEventListener('click', () => { pauseTimer(); baseTime = (parseInt(inputMinutes.value)||0)*60 + (parseInt(inputSeconds.value)||0); currentTime = baseTime; updateDisplay(); });
        modeDownBtn.addEventListener('click', () => { if (mode === 'countdown') return; mode = 'countdown'; modeDownBtn.classList.add('bg-blue-600','text-white'); modeUpBtn.classList.remove('bg-blue-600','text-white'); resetBtn.click(); });
        modeUpBtn.addEventListener('click', () => { if (mode === 'countup') return; mode = 'countup'; modeUpBtn.classList.add('bg-blue-600','text-white'); modeDownBtn.classList.remove('bg-blue-600','text-white'); baseTime = 0; resetBtn.click(); });
        backBtn.addEventListener('click', () => { timeupScreen.classList.add('hidden'); resetBtn.click(); });
        updateDisplay();

        // --- 🎨 色変化の制御（他端末からの受信シミュレーション） ---
        const siteStates = {
            a: { red: false, yellow: false, blue: false },
            b: { red: false, yellow: false, blue: false },
            c: { red: false, yellow: false, blue: false }
        };

        function toggleColor(site, color) {
            siteStates[site][color] = !siteStates[site][color];
            applyStyles(site);
        }

        function clearColor(site) {
            siteStates[site].red = false; siteStates[site].yellow = false; siteStates[site].blue = false;
            applyStyles(site);
        }

        function applyStyles(site) {
            const card = document.getElementById(`card-${site}`);
            const state = siteStates[site];
            card.classList.remove('color-red', 'color-yellow', 'color-blue', 'color-mixed', 'opacity-30', 'border-gray-700');
            
            const activeColors = Object.keys(state).filter(color => state[color]);

            if (activeColors.length === 0) {
                // 「なし」の時は薄く消えかける（不透明度30%）
                card.classList.add('opacity-30', 'border-gray-700');
            } else {
                card.classList.remove('opacity-30');
                if (activeColors.length === 1) { card.classList.add(`color-${activeColors[0]}`); } 
                else { card.classList.add('color-mixed'); }
            }
        }

        // 初期化：すべて最初は「なし（薄い状態）」
        clearColor('a'); clearColor('b'); clearColor('c');
    </script>
</body>
</html>
