<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔴ここにあなたのFirebase情報を貼り付けてください
        const firebaseConfig = {
            apiKey: "AIzaSyA737hpRgZTnO0YMLAwZpVY1qTCwlkBf0c",
            authDomain: "classkikaku-e8e88.firebaseapp.com",
            databaseURL: "https://classkikaku-e8e88-default-rtdb.firebaseio.com",
            projectId: "classkikaku-e8e88",
            storageBucket: "classkikaku-e8e88.firebasestorage.app",
            messagingSenderId: "186126264620",
            appId: "1:186126264620:web:e865311f6e414e91492489"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 全局状態 ---
        let mainTimer = null;
        let isRunning = false;
        let mode = 'countdown';
        let baseTime = 10;
        let currentTime = baseTime;
        let currentScore = 0;
        let isScoreReset = true; // スコアリセットフラグ
        let gameState = 'idle'; // idle, counting, active, grace

        // --- DOM要素 ---
        const display = document.getElementById('timer-display');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeDownBtn = document.getElementById('mode-down-btn');
        const modeUpBtn = document.getElementById('mode-up-btn');
        const setTimeBtn = document.getElementById('set-time-btn');
        const settingArea = document.getElementById('setting-area');
        const timeupScreen = document.getElementById('timeup-screen');
        const backBtn = document.getElementById('back-btn');
        
        // メニュー・スコア関連
        const menuBtn = document.getElementById('menu-btn');
        const menuModal = document.getElementById('menu-modal');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const scoreDisplay = document.getElementById('score-display');
        const scoreResetBtn = document.getElementById('score-reset-btn');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownNumber = document.getElementById('countdown-number');

        // 管理者設定関連
        const targetSiteSelect = document.getElementById('target-site');
        const timerNameInput = document.getElementById('timer-name');
        const timerPointsInput = document.getElementById('timer-points');
        const selectMinutes = document.getElementById('select-minutes');
        const selectSeconds = document.getElementById('select-seconds');
        const addTimerBtn = document.getElementById('add-timer-btn');
        const timerListContainer = document.getElementById('timer-list-container');

        // --- ⚙️ プルダウン生成 ---
        for (let i = 0; i <= 60; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            selectMinutes.appendChild(opt);
        }
        for (let i = 0; i <= 59; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            if (i === 10) opt.selected = true;
            selectSeconds.appendChild(opt);
        }

        // --- 📡 Firebase同期 (メイン状態・スコア) ---
        function syncGameState(state) {
            gameState = state;
            set(ref(db, 'game/state'), state);
        }

        // スコアの自動集計・リセット監視
        onValue(ref(db, 'game/score'), (snapshot) => {
            currentScore = snapshot.val() || 0;
            scoreDisplay.textContent = currentScore;
            if (currentScore === 0) {
                isScoreReset = true;
                startPauseBtn.disabled = false;
                startPauseBtn.opacity = "1";
            } else {
                isScoreReset = false;
            }
        });

        scoreResetBtn.addEventListener('click', () => {
            set(ref(db, 'game/score'), 0);
            // 動いている各種サイトの選択中タイマー情報も初期化
            set(ref(db, 'site_a/activeTimer'), null);
            set(ref(db, 'site_b/activeTimer'), null);
            set(ref(db, 'site_c/activeTimer'), null);
        });

        // --- 📋 管理者メニュー：タイマー追加・削除ルール ---
        addTimerBtn.addEventListener('click', () => {
            const site = targetSiteSelect.value;
            const name = timerNameInput.value.trim();
            const points = parseInt(timerPointsInput.value) || 0;
            const sec = (parseInt(selectMinutes.value)||0)*60 + (parseInt(selectSeconds.value)||0);

            if(!name) return alert("名称を入力してください");

            const newTimerRef = push(ref(db, `timers/${site}`));
            set(newTimerRef, { name, points, duration: sec });

            timerNameInput.value = "";
            timerPointsInput.value = "10";
        });

        // タイマーリストの一覧描画
        onValue(ref(db, 'timers'), (snapshot) => {
            timerListContainer.innerHTML = "";
            const data = snapshot.val() || {};
            ['site_a', 'site_b', 'site_c'].forEach(site => {
                const siteName = site === 'site_a' ? 'SITE A (赤)' : site === 'site_b' ? 'SITE B (黄)' : 'SITE C (青)';
                if(data[site]) {
                    Object.keys(data[site]).forEach(key => {
                        const item = data[site][key];
                        const m = Math.floor(item.duration / 60);
                        const s = item.duration % 60;
                        const div = document.createElement('div');
                        div.className = "flex justify-between items-center bg-gray-50 p-2 rounded-lg border text-sm font-bold";
                        div.innerHTML = `
                            <span>[${siteName}] ${item.name} (${m}分${s}秒) - ${item.points}pt</span>
                            <button class="text-rose-500 hover:text-rose-700 font-black">削除</button>
                        `;
                        div.querySelector('button').addEventListener('click', () => {
                            remove(ref(db, `timers/${site}/${key}`));
                        });
                        timerListContainer.appendChild(div);
                    });
                }
            });
        });

        // メニューの開閉
        menuBtn.addEventListener('click', () => menuModal.classList.remove('hidden'));
        closeMenuBtn.addEventListener('click', () => menuModal.classList.add('hidden'));

        // --- ⏱️ タイマー制御ロジック (3,2,1 カウントダウン内蔵) ---
        function updateDisplay() {
            const minutes = Math.floor(Math.abs(currentTime) / 60);
            const seconds = Math.floor(Math.abs(currentTime) % 60);
            display.textContent = (currentTime < 0 ? '-' : '') + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }

        function tick() {
            if (mode === 'countdown') {
                currentTime--;
                if (currentTime <= 0) {
                    currentTime = 0;
                    endGameSequence();
                }
            } else {
                currentTime++;
            }
            updateDisplay();
        }

        // ゲーム終了時の猶予処理
        function endGameSequence() {
            clearInterval(mainTimer);
            isRunning = false;
            startPauseBtn.textContent = '開始';
            startPauseBtn.className = startPauseBtn.className.replace('bg-amber-500', 'bg-emerald-500');
            
            // indexは00:00固定
            updateDisplay();

            // 終了時ルール: 10秒間だけ「grace(終了猶予)」状態にし、site-〇側で判定を可能にする
            syncGameState('grace');
            timeupScreen.classList.remove('hidden');

            setTimeout(() => {
                syncGameState('idle'); // 10秒経ったら完全にロック
            }, 1000); // 10秒
        }

        startPauseBtn.addEventListener('click', () => {
            if (!isScoreReset) {
                alert("スコアリセットを行わないと開始できません！");
                return;
            }

            if (isRunning) {
                // 一時停止
                clearInterval(mainTimer);
                isRunning = false;
                startPauseBtn.textContent = '開始';
                startPauseBtn.className = startPauseBtn.className.replace('bg-amber-500', 'bg-emerald-500');
                syncGameState('idle');
            } else {
                // 開始時の3, 2, 1カウントダウン処理
                countdownOverlay.classList.remove('hidden');
                let count = 3;
                countdownNumber.textContent = count;
                
                // 3のカウントが始まった瞬間に、site-〇側のロックを解除（状態: counting）
                syncGameState('counting');

                const countInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownNumber.textContent = count;
                    } else {
                        clearInterval(countInterval);
                        countdownOverlay.classList.add('hidden');
                        
                        // 本番タイマースタート
                        mainTimer = setInterval(tick, 1000);
                        startPauseBtn.textContent = '一時停止';
                        startPauseBtn.className = startPauseBtn.className.replace('bg-emerald-500', 'bg-amber-500');
                        isRunning = true;
                        syncGameState('active'); // 状態: アクティブ
                    }
                }, 1000);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(mainTimer);
            isRunning = false;
            currentTime = baseTime;
            startPauseBtn.textContent = '開始';
            startPauseBtn.className = startPauseBtn.className.replace('bg-amber-500', 'bg-emerald-500');
            updateDisplay();
            syncGameState('idle');
        });

        setTimeBtn.addEventListener('click', () => {
            baseTime = (parseInt(selectMinutes.value)||0)*60 + (parseInt(selectSeconds.value)||0);
            currentTime = baseTime;
            updateDisplay();
        });

        modeDownBtn.addEventListener('click', () => {
            if (mode === 'countdown') return;
            mode = 'countdown';
            modeDownBtn.classList.add('bg-blue-600','text-white'); modeUpBtn.classList.add('text-gray-500');
            settingArea.classList.remove('hidden'); resetBtn.click();
        });
        modeUpBtn.addEventListener('click', () => {
            if (mode === 'countup') return;
            mode = 'countup';
            modeUpBtn.classList.add('bg-blue-600','text-white'); modeDownBtn.classList.add('text-gray-500');
            settingArea.classList.add('hidden'); baseTime = 0; resetBtn.click();
        });
        backBtn.addEventListener('click', () => { timeupScreen.classList.add('hidden'); resetBtn.click(); });
        updateDisplay();

        // --- 各サイトの色制御の監視 ---
        window.siteStates = { a: {red:false}, b: {yellow:false}, c: {blue:false} };
        onValue(ref(db, 'site_a/red'), (s) => { window.siteStates.a.red = s.val()===true; applyStyles('a'); });
        onValue(ref(db, 'site_b/yellow'), (s) => { window.siteStates.b.yellow = s.val()===true; applyStyles('b'); });
        onValue(ref(db, 'site_c/blue'), (s) => { window.siteStates.c.blue = s.val()===true; applyStyles('c'); });

        window.applyStyles = function(site) {
            const card = document.getElementById(`card-${site}`);
            const state = window.siteStates[site];
            card.classList.remove('color-red', 'color-yellow', 'color-blue', 'color-mixed', 'opacity-20', 'border-gray-200');
            const activeColors = Object.keys(state).filter(c => state[c]);
            if (activeColors.length === 0) {
                card.classList.add('opacity-20', 'border-gray-200');
            } else {
                card.classList.remove('opacity-20');
                if (site === 'a') card.classList.add('color-red');
                if (site === 'b') card.classList.add('color-yellow');
                if (site === 'c') card.classList.add('color-blue');
            }
        }
    </script>

    <style>
        .color-red { background-color: #fef2f2; border-color: #ef4444; color: #dc2626; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }
        .color-yellow { background-color: #fefce8; border-color: #eab308; color: #ca8a04; box-shadow: 0 10px 30px rgba(234, 179, 8, 0.3); }
        .color-blue { background-color: #eff6ff; border-color: #3b82f6; color: #2563eb; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-height-screen m-0 p-0 overflow-hidden relative">

    <div id="countdown-overlay" class="hidden fixed inset-0 bg-gray-900/90 flex justify-center items-center z-50">
        <div id="countdown-number" class="text-white text-[15rem] font-black animate-ping">3</div>
    </div>

    <div id="timeup-screen" class="hidden fixed inset-0 bg-red-600 flex flex-col justify-center items-center z-40 animate-pulse">
        <h1 class="text-[12rem] font-black tracking-widest text-white">TIME UP！</h1>
        <p class="text-white text-2xl font-bold mt-4">プレイヤーは10秒間だけ最後の判定操作が可能です！</p>
        <button id="back-btn" class="absolute bottom-10 right-10 px-8 py-4 bg-white text-gray-900 text-lg font-black rounded-xl shadow-2xl">戻る</button>
    </div>

    <div class="absolute top-6 right-6 z-30 flex items-center space-x-6 bg-white/80 backdrop-blur p-3 rounded-2xl border border-gray-200 shadow-sm">
        <div class="text-right">
            <span class="text-xs font-black text-gray-400 block tracking-wider">TOTAL SCORE</span>
            <span id="score-display" class="text-3xl font-mono font-black text-blue-600">0</span><span class="text-sm font-bold text-gray-500 ml-1">pt</span>
        </div>
        <button id="score-reset-btn" class="px-3 py-1.5 bg-gray-200 hover:bg-gray-300 text-xs font-black rounded-xl transition">スコアリセット</button>
        <button id="menu-btn" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white text-sm font-black rounded-xl shadow transition">⚙️ メニュー</button>
    </div>

    <div id="menu-modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center z-50">
        <div class="bg-white rounded-[2rem] p-8 w-[500px] shadow-2xl max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black">⚙️ タイマー管理・問題追加</h2>
                <button id="close-menu-btn" class="text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
            </div>
            
            <div class="space-y-4 border-b pb-6 mb-4">
                <div>
                    <label class="block text-xs font-black text-gray-400 mb-1">追加先端末</label>
                    <select id="target-site" class="w-full p-2 border rounded-xl font-bold bg-gray-50">
                        <option value="site_a">SITE A (赤担当)</option>
                        <option value="site_b">SITE B (黄担当)</option>
                        <option value="site_c">SITE C (青担当)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-gray-400 mb-1">タイマーの名称</label>
                    <input id="timer-name" type="text" placeholder="例: 暗号を解読せよ！" class="w-full p-2 border rounded-xl font-bold">
                </div>
                <div class="flex space-x-4">
                    <div class="w-1/2">
                        <label class="block text-xs font-black text-gray-400 mb-1">獲得ポイント</label>
                        <input id="timer-points" type="number" value="10" class="w-full p-2 border rounded-xl font-bold text-center">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-black text-gray-400 mb-1">目標時間設定</label>
                        <div class="flex items-center space-x-1">
                            <select id="select-minutes" class="w-full p-2 border rounded-xl font-bold bg-gray-50"></select>
                            <span class="text-xs font-bold text-gray-500">分</span>
                            <select id="select-seconds" class="w-full p-2 border rounded-xl font-bold bg-gray-50"></select>
                            <span class="text-xs font-bold text-gray-500">秒</span>
                        </div>
                    </div>
                </div>
                <button id="add-timer-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl shadow transition">このタイマーを追加して同期 (完了)</button>
            </div>

            <label class="block text-xs font-black text-gray-400 mb-2">現在登録されている選択肢一覧</label>
            <div id="timer-list-container" class="space-y-2 overflow-y-auto flex-1 pr-1">
                </div>
        </div>
    </div>

    <div id="main-content" class="flex h-screen w-screen">
        <div class="w-1/3 flex flex-col justify-center items-center border-r border-gray-200 p-6 bg-white z-10 shadow-lg">
            <div class="mb-10 bg-gray-100 p-1.5 rounded-xl flex space-x-2 border border-gray-200">
                <button id="mode-down-btn" class="px-6 py-2.5 rounded-lg bg-blue-600 text-white font-black text-sm shadow-sm transition">カウントダウン</button>
                <button id="mode-up-btn" class="px-6 py-2.5 rounded-lg text-gray-500 hover:text-gray-800 font-black text-sm transition">カウントアップ</button>
            </div>
            <div id="timer-display" class="text-[10rem] font-mono font-black tracking-tighter text-gray-900 mb-6 select-none leading-none">00:10</div>
            <div id="setting-area" class="flex items-center space-x-3 mb-12 text-lg bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-inner">
                <input id="input-minutes" type="number" min="0" max="60" value="0" class="w-16 p-1 text-center font-bold border rounded-lg">分
                <input id="input-seconds" type="number" min="0" max="59" value="10" class="w-16 p-1 text-center font-bold border rounded-lg">秒
                <button id="set-time-btn" class="ml-3 px-4 py-1.5 bg-gray-800 text-white text-xs font-black rounded-xl">設定</button>
            </div>
            <div class="flex space-x-6">
                <button id="start-pause-btn" class="w-40 py-4 bg-emerald-500 text-white text-xl font-black rounded-2xl shadow-md transition">開始</button>
                <button id="reset-btn" class="w-40 py-4 bg-rose-500 text-white text-xl font-black rounded-2xl shadow-md transition">リセット</button>
            </div>
        </div>

        <div class="w-2/3 flex justify-center items-center p-8 bg-gray-50 relative">
            <div class="relative w-[900px] h-[650px]">
                <div id="card-a" class="absolute top-0 left-1/2 -translate-x-1/2 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE A</span>
                    <div class="text-7xl font-mono font-black tracking-wide">00:00</div>
                </div>
                <div id="card-b" class="absolute bottom-0 -left-16 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE B</span>
                    <div class="text-7xl font-mono font-black tracking-wide">00:00</div>
                </div>
                <div id="card-c" class="absolute bottom-0 -right-16 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE C</span>
                    <div class="text-7xl font-mono font-black tracking-wide">00:00</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
