<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔴ここにFirebaseの情報を貼り付ける
const firebaseConfig = {
            apiKey: "AIzaSyA737hpRgZTnO0YMLAwZpVY1qTCwlkBf0c",
            authDomain: "classkikaku-e8e88.firebaseapp.com",
            databaseURL: "https://classkikaku-e8e88-default-rtdb.firebaseio.com",
            projectId: "classkikaku-e8e88",
            storageBucket: "classkikaku-e8e88.firebasestorage.app",
            messagingSenderId: "186126264620",
            appId: "1:186126264620:web:e865311f6e414e91492489"
        };


        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 📡 Firebaseのデータベースを24時間監視する設定
        // 端末A（赤）の監視
        onValue(ref(db, 'site_a/red'), (snapshot) => {
            const data = snapshot.val();
            siteStates.a.red = data === true; // データの状態（true/false）を反映
            applyStyles('a');
        });

        // 端末B（黄）の監視（後で繋がります）
        onValue(ref(db, 'site_b/yellow'), (snapshot) => {
            const data = snapshot.val();
            siteStates.b.yellow = data === true;
            applyStyles('b');
        });

        // 端末C（青）の監視（後で繋がります）
        onValue(ref(db, 'site_c/blue'), (snapshot) => {
            const data = snapshot.val();
            siteStates.c.blue = data === true;
            applyStyles('c');
        });
    </script>

    <style>
        .color-red { background-color: #fef2f2; border-color: #ef4444; color: #dc2626; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }
        .color-yellow { background-color: #fefce8; border-color: #eab308; color: #ca8a04; box-shadow: 0 10px 30px rgba(234, 179, 8, 0.3); }
        .color-blue { background-color: #eff6ff; border-color: #3b82f6; color: #2563eb; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }
        
        .color-mixed { 
            border-color: transparent; 
            background-image: linear-gradient(#ffffff, #ffffff), linear-gradient(135deg, #ef4444, #eab308, #3b82f6); 
            background-origin: border-box; 
            background-clip: padding-box, border-box; 
            color: #1f2937;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15); 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-height-screen m-0 p-0 overflow-hidden relative">

    <div id="timeup-screen" class="hidden fixed inset-0 bg-red-600 flex flex-col justify-center items-center z-50 animate-pulse">
        <h1 class="text-[12rem] font-black tracking-widest text-white drop-shadow-[0_10px_10px_rgba(0,0,0,0.3)]">TIME UP！</h1>
        <button id="back-btn" class="absolute bottom-10 right-10 px-8 py-4 bg-white hover:bg-gray-100 text-gray-900 text-lg font-black rounded-xl shadow-2xl transition transform active:scale-95">
            戻る
        </button>
    </div>

    <div id="main-content" class="flex h-screen w-screen">
        
        <div class="w-1/3 flex flex-col justify-center items-center border-r border-gray-200 p-6 bg-white z-10 shadow-lg">
            <div class="mb-10 bg-gray-100 p-1.5 rounded-xl flex space-x-2 border border-gray-200">
                <button id="mode-down-btn" class="px-6 py-2.5 rounded-lg bg-blue-600 text-white font-black text-sm shadow-sm transition">カウントダウン</button>
                <button id="mode-up-btn" class="px-6 py-2.5 rounded-lg text-gray-500 hover:text-gray-800 font-black text-sm transition">カウントアップ</button>
            </div>
            
            <div id="timer-display" class="text-[10rem] font-mono font-black tracking-tighter text-gray-900 mb-6 select-none leading-none">00:10</div>
            
            <div id="setting-area" class="flex items-center space-x-3 mb-12 text-lg bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-inner transition-all duration-300">
                <select id="select-minutes" class="w-24 bg-white border border-gray-300 text-center font-black text-gray-800 text-2xl rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none"></select>
                <span class="text-gray-500 font-black">分</span>
                <select id="select-seconds" class="w-24 bg-white border border-gray-300 text-center font-black text-gray-800 text-2xl rounded-xl p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none"></select>
                <span class="text-gray-500 font-black">秒</span>
                <button id="set-time-btn" class="ml-3 px-5 py-2 bg-gray-800 hover:bg-gray-700 text-white text-sm font-black rounded-xl shadow transition">設定</button>
            </div>

            <div class="flex space-x-6">
                <button id="start-pause-btn" class="w-40 py-4 bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-black rounded-2xl shadow-md transition transform active:scale-95">開始</button>
                <button id="reset-btn" class="w-40 py-4 bg-rose-500 hover:bg-rose-600 text-white text-xl font-black rounded-2xl shadow-md transition transform active:scale-95">リセット</button>
            </div>
        </div>

        <div class="w-2/3 flex justify-center items-center p-8 bg-gray-50 relative">
            
            <div class="relative w-[900px] h-[650px]">
                
                <div id="card-a" class="absolute top-0 left-1/2 -translate-x-1/2 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE A</span>
                    <div class="text-7xl font-mono font-black tracking-wide">00:00</div>
                </div>

                <div id="card-b" class="absolute bottom-0 -left-16 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE B</span>
                    <div class="text-7xl font-mono font-black tracking-wide">00:00</div>
                </div>

                <div id="card-c" class="absolute bottom-0 -right-16 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE C</span>
                    <div class="text-7xl font-mono font-black tracking-wide">00:00</div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // --- プルダウン自動生成 ---
        const selectMinutes = document.getElementById('select-minutes');
        const selectSeconds = document.getElementById('select-seconds');
        for (let i = 0; i <= 60; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            if (i === 0) opt.selected = true; selectMinutes.appendChild(opt);
        }
        for (let i = 0; i <= 59; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            if (i === 10) opt.selected = true; selectSeconds.appendChild(opt);
        }

        // --- メインタイマー制御 ---
        let timer = null; let isRunning = false; let mode = 'countdown'; let baseTime = 10; let currentTime = baseTime;
        const display = document.getElementById('timer-display');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeDownBtn = document.getElementById('mode-down-btn');
        const modeUpBtn = document.getElementById('mode-up-btn');
        const setTimeBtn = document.getElementById('set-time-btn');
        const settingArea = document.getElementById('setting-area');
        const timeupScreen = document.getElementById('timeup-screen');
        const backBtn = document.getElementById('back-btn');

        function updateDisplay() {
            const minutes = Math.floor(Math.abs(currentTime) / 60); const seconds = Math.floor(Math.abs(currentTime) % 60);
            display.textContent = (currentTime < 0 ? '-' : '') + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }
        function tick() {
            if (mode === 'countdown') { currentTime--; if (currentTime <= 0) { currentTime = 0; pauseTimer(); timeupScreen.classList.remove('hidden'); } } 
            else { currentTime++; } updateDisplay();
        }
        function pauseTimer() { clearInterval(timer); isRunning = false; startPauseBtn.textContent = '開始'; startPauseBtn.className = startPauseBtn.className.replace('bg-amber-500', 'bg-emerald-500'); }
        
        startPauseBtn.addEventListener('click', () => { 
            if (isRunning) { pauseTimer(); } 
            else { timer = setInterval(tick, 1000); startPauseBtn.textContent = '一時停止'; startPauseBtn.className = startPauseBtn.className.replace('bg-emerald-500', 'bg-amber-500'); isRunning = true; } 
        });
        
        resetBtn.addEventListener('click', () => { pauseTimer(); currentTime = baseTime; updateDisplay(); });
        setTimeBtn.addEventListener('click', () => { pauseTimer(); baseTime = (parseInt(selectMinutes.value)||0)*60 + (parseInt(selectSeconds.value)||0); currentTime = baseTime; updateDisplay(); });
        
        modeDownBtn.addEventListener('click', () => { if (mode === 'countdown') return; mode = 'countdown'; modeDownBtn.classList.add('bg-blue-600','text-white'); modeUpBtn.classList.remove('bg-blue-600','text-white'); settingArea.classList.remove('hidden'); resetBtn.click(); });
        modeUpBtn.addEventListener('click', () => { if (mode === 'countup') return; mode = 'countup'; modeUpBtn.classList.add('bg-blue-600','text-white'); modeDownBtn.classList.remove('bg-blue-600','text-white'); settingArea.classList.add('hidden'); baseTime = 0; resetBtn.click(); });
        backBtn.addEventListener('click', () => { timeupScreen.classList.add('hidden'); resetBtn.click(); });
        updateDisplay();

        // --- 🎨 色変化の制御（Firebaseからの受信用） ---
        // この状態オブジェクトをFirebaseの通知で書き換えます
        window.siteStates = {
            a: { red: false, yellow: false, blue: false },
            b: { red: false, yellow: false, blue: false },
            c: { red: false, yellow: false, blue: false }
        };

        window.applyStyles = function(site) {
            const card = document.getElementById(`card-${site}`);
            const state = window.siteStates[site];
            card.classList.remove('color-red', 'color-yellow', 'color-blue', 'color-mixed', 'opacity-20', 'border-gray-200', 'text-gray-900');
            
            const activeColors = Object.keys(state).filter(color => state[color]);

            if (activeColors.length === 0) {
                card.classList.add('opacity-20', 'border-gray-200', 'text-gray-300');
            } else {
                card.classList.remove('opacity-20');
                if (activeColors.length === 1) { card.classList.add(`color-${activeColors[0]}`); } 
                else { card.classList.add('color-mixed'); }
            }
        }
    </script>
</body>
</html>
