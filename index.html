<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🔴ここにあなたのFirebase情報を貼り付けてください
        const firebaseConfig = {
            apiKey: "AIzaSyA737hpRgZTnO0YMLAwZpVY1qTCwlkBf0c",
            authDomain: "classkikaku-e8e88.firebaseapp.com",
            databaseURL: "https://classkikaku-e8e88-default-rtdb.firebaseio.com",
            projectId: "classkikaku-e8e88",
            storageBucket: "classkikaku-e8e88.firebasestorage.app",
            messagingSenderId: "186126264620",
            appId: "1:186126264620:web:e865311f6e414e91492489"
        };

const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 各サイトの設定（MY_SITE = 'site_a' など）
        const MY_SITE = 'site_a';

        let gameState = 'idle';      
        let activeTimer = null;      
        let countdownInterval = null;
        let subTimeLeft = 0;         
        let graceTimeout = null;     
        let isWaitingForMain = false;
        let isInitialized = false;

        // 🟢【ここを書き換え！】この2行のURLをご自身のmp3ファイル名にしてください
        const startAudio = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
        const timeupAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        const overlay = document.getElementById('lock-overlay');
        const overlayText = document.getElementById('lock-text');

        let mainTimer = null;
        let isRunning = false;
        let mode = 'countdown';
        let baseTime = 10;
        let currentTime = baseTime;
        let currentScore = 0;
        let isScoreReset = true;
        let gameState = 'idle';
        let allTimersData = {};

        // 🔊 【追加】メイン画面用の効果音（URLは自由に変更可能です）
const mainStartAudio = new Audio('https://actions.google.com/sounds/v1/alarms/air_horn.ogg'); // 開始のホーン
        const mainTimeupAudio = new Audio('https://actions.google.com/sounds/v1/science_fiction/ambient_space_alarm.ogg'); // タイムアップアラーム

        const display = document.getElementById('timer-display');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeDownBtn = document.getElementById('mode-down-btn');
        const modeUpBtn = document.getElementById('mode-up-btn');
        const setTimeBtn = document.getElementById('set-time-btn');
        const settingArea = document.getElementById('setting-area');
        const timeupScreen = document.getElementById('timeup-screen');
        const backBtn = document.getElementById('back-btn');
        
        const menuBtn = document.getElementById('menu-btn');
        const menuModal = document.getElementById('menu-modal');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const scoreDisplay = document.getElementById('score-display');
        const scoreResetBtn = document.getElementById('score-reset-btn');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const countdownNumber = document.getElementById('countdown-number');

        const inputMinutes = document.getElementById('input-minutes');
        const inputSeconds = document.getElementById('input-seconds');

        const targetSiteSelect = document.getElementById('target-site');
        const timerNameInput = document.getElementById('timer-name');
        const timerPointsInput = document.getElementById('timer-points');
        const selectMinutes = document.getElementById('select-minutes');
        const selectSeconds = document.getElementById('select-seconds');
        const addTimerBtn = document.getElementById('add-timer-btn');
        const filterSiteSelect = document.getElementById('filter-site'); 
        const timerListContainer = document.getElementById('timer-list-container');

        // プルダウン生成
        for (let i = 0; i <= 60; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            inputMinutes.appendChild(opt);
        }
        for (let i = 0; i <= 59; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            if (i === 10) opt.selected = true; 
            inputSeconds.appendChild(opt);
        }
        for (let i = 0; i <= 60; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            selectMinutes.appendChild(opt);
        }
        for (let i = 0; i <= 59; i++) {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = String(i).padStart(2, '0');
            if (i === 10) opt.selected = true;
            selectSeconds.appendChild(opt);
        }

        function syncGameState(state) {
            gameState = state;
            set(ref(db, 'game/state'), state);
        }

        onValue(ref(db, 'game/score'), (snapshot) => {
            currentScore = snapshot.val() || 0;
            scoreDisplay.textContent = currentScore;
            isScoreReset = (currentScore === 0);
        });

        scoreResetBtn.addEventListener('click', () => {
            set(ref(db, 'game/score'), 0);
            set(ref(db, 'site_a/active'), null); set(ref(db, 'site_a/timeLeft'), 0);
            set(ref(db, 'site_b/active'), null); set(ref(db, 'site_b/timeLeft'), 0);
            set(ref(db, 'site_c/active'), null); set(ref(db, 'site_c/timeLeft'), 0);
        });

        addTimerBtn.addEventListener('click', () => {
            const site = targetSiteSelect.value;
            const name = timerNameInput.value.trim();
            const points = parseInt(timerPointsInput.value) || 0;
            const sec = (parseInt(selectMinutes.value)||0)*60 + (parseInt(selectSeconds.value)||0);
            if(!name) return alert("名称を入力してください");
            push(ref(db, `timers/${site}`), { name, points, duration: sec });
            timerNameInput.value = ""; timerPointsInput.value = "10";
        });

        function renderTimerList() {
            timerListContainer.innerHTML = "";
            const selectedSite = filterSiteSelect.value;
            if (allTimersData[selectedSite]) {
                Object.keys(allTimersData[selectedSite]).forEach(key => {
                    const item = allTimersData[selectedSite][key];
                    const m = Math.floor(item.duration / 60); const s = item.duration % 60;
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center bg-gray-50 p-2.5 rounded-xl border text-sm font-bold shadow-sm";
                    div.innerHTML = `<div>${item.name} (${m}:${s})</div><button class="text-rose-500 px-2 font-black">削除</button>`;
                    div.querySelector('button').addEventListener('click', () => { remove(ref(db, `timers/${selectedSite}/${key}`)); });
                    timerListContainer.appendChild(div);
                });
            }
        }

        onValue(ref(db, 'timers'), (snapshot) => { allTimersData = snapshot.val() || {}; renderTimerList(); });
        filterSiteSelect.addEventListener('change', renderTimerList);
        menuBtn.addEventListener('click', () => menuModal.classList.remove('hidden'));
        closeMenuBtn.addEventListener('click', () => menuModal.classList.add('hidden'));

        function updateDisplay() {
            const minutes = Math.floor(Math.abs(currentTime) / 60);
            const seconds = Math.floor(Math.abs(currentTime) % 60);
            display.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }

        function tick() {
            if (mode === 'countdown') {
                currentTime--;
                if (currentTime <= 0) { currentTime = 0; endGameSequence(); }
            } else { currentTime++; }
            updateDisplay();
        }

        function endGameSequence() {
            clearInterval(mainTimer); isRunning = false;
            startPauseBtn.textContent = '開始';
            timeupScreen.classList.remove('hidden');
            
            // 🔊 【追加】全体タイムアップ音を再生
            mainTimeupAudio.play().catch(e => console.log("Audio play blocked"));

            syncGameState('grace');
            setTimeout(() => { syncGameState('idle'); }, 10000); 
        }

        startPauseBtn.addEventListener('click', () => {
            if (!isScoreReset) return alert("スコアリセットを行わないと開始できません！");
            if (isRunning) {
                clearInterval(mainTimer); isRunning = false;
                startPauseBtn.textContent = '開始'; syncGameState('idle');
            } else {
                countdownOverlay.classList.remove('hidden');
                let count = 3; countdownNumber.textContent = count;
                syncGameState('counting');
                const countInterval = setInterval(() => {
                    count--;
                    if (count > 0) { countdownNumber.textContent = count; } 
                    else {
                        clearInterval(countInterval); countdownOverlay.classList.add('hidden');
                        
                        // 🔊 【追加】3, 2, 1... GO! の開始音を再生
                        mainStartAudio.play().catch(e => console.log("Audio play blocked"));

                        mainTimer = setInterval(tick, 1000); isRunning = true;
                        startPauseBtn.textContent = '一時停止'; syncGameState('active');
                    }
                }, 1000);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(mainTimer); isRunning = false; currentTime = baseTime;
            startPauseBtn.textContent = '開始'; updateDisplay(); syncGameState('idle');
        });

        setTimeBtn.addEventListener('click', () => {
            baseTime = (parseInt(inputMinutes.value)||0)*60 + (parseInt(inputSeconds.value)||0);
            currentTime = baseTime; updateDisplay();
        });

        // --- 右側カードのリアルタイム秒数同期（シンプルな元の仕様に統一） ---
        onValue(ref(db, 'site_a/timeLeft'), (snapshot) => { updateCardDisplay('a', snapshot.val() || 0); });
        onValue(ref(db, 'site_b/timeLeft'), (snapshot) => { updateCardDisplay('b', snapshot.val() || 0); });
        onValue(ref(db, 'site_c/timeLeft'), (snapshot) => { updateCardDisplay('c', snapshot.val() || 0); });

        function updateCardDisplay(site, timeLeft) {
            const cardEl = document.getElementById(`card-${site}`);
            const displayEl = document.getElementById(`time-display-${site}`);
            
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            displayEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

            cardEl.classList.remove('color-red', 'color-yellow', 'color-blue', 'opacity-20', 'border-gray-200');
            if (timeLeft === 0) {
                cardEl.classList.add('opacity-20', 'border-gray-200');
                displayEl.className = "text-7xl font-mono font-black tracking-wide text-gray-400";
            } else {
                if (site === 'a') cardEl.classList.add('color-red');
                if (site === 'b') cardEl.classList.add('color-yellow');
                if (site === 'c') cardEl.classList.add('color-blue');
                displayEl.className = "text-7xl font-mono font-black tracking-wide text-gray-900";
            }
        }

        modeDownBtn.addEventListener('click', () => { mode = 'countdown'; settingArea.classList.remove('hidden'); resetBtn.click(); });
        modeUpBtn.addEventListener('click', () => { mode = 'countup'; settingArea.classList.add('hidden'); baseTime = 0; resetBtn.click(); });
        backBtn.addEventListener('click', () => { timeupScreen.classList.add('hidden'); resetBtn.click(); });
        updateDisplay();
    </script>

    <style>
        .color-red { background-color: #fef2f2; border-color: #ef4444; color: #dc2626; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }
        .color-yellow { background-color: #fefce8; border-color: #eab308; color: #ca8a04; box-shadow: 0 10px 30px rgba(234, 179, 8, 0.3); }
        .color-blue { background-color: #eff6ff; border-color: #3b82f6; color: #2563eb; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-height-screen m-0 p-0 overflow-hidden relative">

    <div id="countdown-overlay" class="hidden fixed inset-0 bg-gray-900/90 flex justify-center items-center z-50">
        <div id="countdown-number" class="text-white text-[15rem] font-black animate-ping">3</div>
    </div>

    <div id="timeup-screen" class="hidden fixed inset-0 bg-red-600 flex flex-col justify-center items-center z-40 animate-pulse">
        <h1 class="text-[12rem] font-black tracking-widest text-white">TIME UP！</h1>
        <p class="text-white text-2xl font-bold mt-4">プレイヤーは10秒間だけ最後の判定操作が可能です！</p>
        <button id="back-btn" class="absolute bottom-10 right-10 px-8 py-4 bg-white text-gray-900 text-lg font-black rounded-xl shadow-2xl">戻る</button>
    </div>

    <div class="absolute top-6 right-6 z-30">
        <button id="menu-btn" class="px-5 py-3 bg-gray-800 hover:bg-gray-700 text-white text-sm font-black rounded-2xl shadow transition">⚙️ 設定メニュー</button>
    </div>

    <div id="menu-modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center z-50">
        <div class="bg-white rounded-[2rem] p-8 w-[500px] shadow-2xl max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black">⚙️ タイマー管理・問題追加</h2>
                <button id="close-menu-btn" class="text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
            </div>
            
            <div class="space-y-4 border-b pb-6 mb-4">
                <div>
                    <label class="block text-xs font-black text-gray-400 mb-1">追加先端末</label>
                    <select id="target-site" class="w-full p-2 border rounded-xl font-bold bg-gray-50">
                        <option value="site_a">SITE A (赤担当)</option>
                        <option value="site_b">SITE B (黄担当)</option>
                        <option value="site_c">SITE C (青担当)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-gray-400 mb-1">タイマーの名称</label>
                    <input id="timer-name" type="text" placeholder="例: 暗号を解読せよ！" class="w-full p-2 border rounded-xl font-bold">
                </div>
                <div class="flex space-x-4">
                    <div class="w-1/2">
                        <label class="block text-xs font-black text-gray-400 mb-1">獲得ポイント</label>
                        <input id="timer-points" type="number" value="10" class="w-full p-2 border rounded-xl font-bold text-center">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-black text-gray-400 mb-1">目標時間設定</label>
                        <div class="flex items-center space-x-1">
                            <select id="select-minutes" class="w-full p-2 border rounded-xl font-bold bg-gray-50"></select>
                            <span class="text-xs font-bold text-gray-500">分</span>
                            <select id="select-seconds" class="w-full p-2 border rounded-xl font-bold bg-gray-50"></select>
                            <span class="text-xs font-bold text-gray-500">秒</span>
                        </div>
                    </div>
                </div>
                <button id="add-timer-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl shadow transition">このタイマーを追加して同期</button>
            </div>

            <div class="flex flex-col flex-1 min-h-0">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-black text-gray-400">現在登録されている選択肢一覧</label>
                    <select id="filter-site" class="p-1 border rounded-lg text-xs font-bold bg-gray-50">
                        <option value="site_a">SITE A (赤)</option>
                        <option value="site_b">SITE B (黄)</option>
                        <option value="site_c">SITE C (青)</option>
                    </select>
                </div>
                <div id="timer-list-container" class="space-y-2 overflow-y-auto flex-1 pr-1"></div>
            </div>
        </div>
    </div>

    <div id="main-content" class="flex h-screen w-screen">
        <div class="w-1/3 flex flex-col justify-between items-center border-r border-gray-200 py-10 px-6 bg-white z-10 shadow-lg">
            <div class="bg-gray-100 p-1.5 rounded-xl flex space-x-2 border border-gray-200">
                <button id="mode-down-btn" class="px-6 py-2.5 rounded-lg bg-blue-600 text-white font-black text-sm shadow-sm transition">カウントダウン</button>
                <button id="mode-up-btn" class="px-6 py-2.5 rounded-lg text-gray-500 hover:text-gray-800 font-black text-sm transition">カウントアップ</button>
            </div>
            
            <div class="w-full flex flex-col items-center">
                <div id="timer-display" class="text-[10rem] font-mono font-black tracking-tighter text-gray-900 select-none leading-none mb-4">00:10</div>
                
                <div id="setting-area" class="flex items-center space-x-2 text-sm bg-gray-50 p-3 rounded-2xl border border-gray-200 shadow-inner mb-6">
                    <select id="input-minutes" class="w-16 p-1.5 text-center font-bold border rounded-lg bg-white appearance-none"></select>
                    <span class="font-bold text-gray-500">分</span>
                    <select id="input-seconds" class="w-16 p-1.5 text-center font-bold border rounded-lg bg-white appearance-none"></select>
                    <span class="font-bold text-gray-500">秒</span>
                    <button id="set-time-btn" class="ml-2 px-4 py-1.5 bg-gray-800 hover:bg-gray-700 text-white text-xs font-black rounded-xl transition">設定</button>
                </div>

                <div class="flex space-x-4">
                    <button id="start-pause-btn" class="w-36 py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white text-lg font-black rounded-2xl shadow-md transition">開始</button>
                    <button id="reset-btn" class="w-36 py-3.5 bg-rose-500 hover:bg-rose-600 text-white text-lg font-black rounded-2xl shadow-md transition">リセット</button>
                </div>
            </div>

            <div class="w-full border-t pt-6 text-center">
                <span class="text-xs font-black text-gray-400 tracking-widest block mb-1">TOTAL SCORE</span>
                <div class="flex items-center justify-center space-x-4">
                    <div class="leading-none">
                        <span id="score-display" class="text-7xl font-mono font-black text-blue-600 leading-none">0</span>
                        <span class="text-xl font-black text-gray-500 ml-1">pt</span>
                    </div>
                    <button id="score-reset-btn" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-black rounded-xl border transition">リセット</button>
                </div>
            </div>
        </div>

        <div class="w-2/3 flex justify-center items-center p-8 bg-gray-50 relative">
            <div class="relative w-[900px] h-[650px]">
                <div id="card-a" class="absolute top-0 left-1/2 -translate-x-1/2 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500 opacity-20">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE A</span>
                    <div id="time-display-a" class="text-7xl font-mono font-black tracking-wide text-gray-400">00:00</div>
                </div>
                <div id="card-b" class="absolute bottom-0 -left-16 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500 opacity-20">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE B</span>
                    <div id="time-display-b" class="text-7xl font-mono font-black tracking-wide text-gray-400">00:00</div>
                </div>
                <div id="card-c" class="absolute bottom-0 -right-16 flex flex-col items-center bg-white border-4 border-gray-200 p-8 rounded-[2.5rem] w-80 shadow-xl transition-all duration-500 opacity-20">
                    <span class="text-sm font-black text-gray-400 tracking-widest mb-2">SITE C</span>
                    <div id="time-display-c" class="text-7xl font-mono font-black tracking-wide text-gray-400">00:00</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
