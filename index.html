<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-height-screen">

    <div class="flex h-screen w-screen m-0 p-0 overflow-hidden">
        
        <div class="w-1/2 flex flex-col justify-center items-center border-r border-gray-700 p-8 bg-gray-800">
            
            <div class="mb-6 bg-gray-700 p-1 rounded-lg flex space-x-2">
                <button id="mode-down-btn" class="px-4 py-2 rounded-md bg-blue-600 text-white font-bold transition">
                    カウントダウン
                </button>
                <button id="mode-up-btn" class="px-4 py-2 rounded-md text-gray-400 hover:text-white font-bold transition">
                    カウントアップ
                </button>
            </div>

            <div id="timer-display" class="text-9xl font-mono font-bold tracking-wider text-yellow-400 mb-4 select-none">
                10:00
            </div>

            <div class="flex items-center space-x-2 mb-10 text-xl bg-gray-700 p-3 rounded-xl shadow-inner">
                <input id="input-minutes" type="number" min="0" max="999" value="10" 
                    class="w-16 bg-gray-800 text-center font-bold text-yellow-400 rounded p-1 focus:outline-none focus:ring-2 focus:ring-blue-500 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                <span class="text-gray-400 font-bold">分</span>
                <input id="input-seconds" type="number" min="0" max="59" value="0" 
                    class="w-16 bg-gray-800 text-center font-bold text-yellow-400 rounded p-1 focus:outline-none focus:ring-2 focus:ring-blue-500 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                <span class="text-gray-400 font-bold">秒</span>
                <button id="set-time-btn" class="ml-2 px-3 py-1 bg-gray-600 hover:bg-gray-500 text-sm font-bold rounded transition">
                    設定
                </button>
            </div>

            <div class="flex space-x-6">
                <button id="start-pause-btn" class="w-40 py-4 bg-emerald-600 hover:bg-emerald-500 text-xl font-bold rounded-xl shadow-lg transition transform active:scale-95">
                    開始
                </button>
                <button id="reset-btn" class="w-40 py-4 bg-rose-600 hover:bg-rose-500 text-xl font-bold rounded-xl shadow-lg transition transform active:scale-95">
                    リセット
                </button>
            </div>

        </div>

        <div class="w-1/2 flex justify-center items-center p-8 bg-gray-900 relative">
            
            <div class="relative w-[400px] h-[400px]">
                
                <div class="absolute top-0 left-1/2 -translate-x-1/2 flex flex-col items-center bg-gray-800/80 border border-cyan-500 p-4 rounded-2xl w-40 shadow-xl">
                    <span class="text-xs font-bold text-cyan-400 tracking-wider mb-1">SITE A</span>
                    <div id="sub-timer-a" class="text-3xl font-mono font-bold text-white">00:00</div>
                    <span class="text-[10px] text-gray-500 mt-1">待機中</span>
                </div>

                <div class="absolute bottom-[10%] left-0 flex flex-col items-center bg-gray-800/80 border border-emerald-500 p-4 rounded-2xl w-40 shadow-xl">
                    <span class="text-xs font-bold text-emerald-400 tracking-wider mb-1">SITE B</span>
                    <div id="sub-timer-b" class="text-3xl font-mono font-bold text-white">00:00</div>
                    <span class="text-[10px] text-gray-500 mt-1">待機中</span>
                </div>

                <div class="absolute bottom-[10%] right-0 flex flex-col items-center bg-gray-800/80 border border-amber-500 p-4 rounded-2xl w-40 shadow-xl">
                    <span class="text-xs font-bold text-amber-400 tracking-wider mb-1">SITE C</span>
                    <div id="sub-timer-c" class="text-3xl font-mono font-bold text-white">00:00</div>
                    <span class="text-[10px] text-gray-500 mt-1">待機中</span>
                </div>

            </div>

        </div>

    </div>

    <script>
        let timer = null;
        let isRunning = false;
        let mode = 'countdown';
        let baseTime = 600; 
        let currentTime = baseTime;

        const display = document.getElementById('timer-display');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeDownBtn = document.getElementById('mode-down-btn');
        const modeUpBtn = document.getElementById('mode-up-btn');
        const inputMinutes = document.getElementById('input-minutes');
        const inputSeconds = document.getElementById('input-seconds');
        const setTimeBtn = document.getElementById('set-time-btn');

        function updateDisplay() {
            const minutes = Math.floor(Math.abs(currentTime) / 60);
            const seconds = Math.floor(Math.abs(currentTime) % 60);
            display.textContent = (currentTime < 0 ? '-' : '') + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }

        function tick() {
            if (mode === 'countdown') {
                currentTime--;
                if (currentTime <= 0) { currentTime = 0; pauseTimer(); }
            } else { currentTime++; }
            updateDisplay();
        }

        function pauseTimer() {
            clearInterval(timer);
            isRunning = false;
            startPauseBtn.textContent = '開始';
            startPauseBtn.className = startPauseBtn.className.replace('bg-amber-600', 'bg-emerald-600');
        }

        startPauseBtn.addEventListener('click', () => {
            if (isRunning) { pauseTimer(); } 
            else {
                timer = setInterval(tick, 1000);
                startPauseBtn.textContent = '一時停止';
                startPauseBtn.className = startPauseBtn.className.replace('bg-emerald-600', 'bg-amber-600');
                isRunning = true;
            }
        });

        resetBtn.addEventListener('click', () => { pauseTimer(); currentTime = baseTime; updateDisplay(); });
        setTimeBtn.addEventListener('click', () => { pauseTimer(); baseTime = (parseInt(inputMinutes.value)||0)*60 + (parseInt(inputSeconds.value)||0); currentTime = baseTime; updateDisplay(); });
        modeDownBtn.addEventListener('click', () => { if (mode === 'countdown') return; mode = 'countdown'; modeDownBtn.classList.add('bg-blue-600','text-white'); modeUpBtn.classList.remove('bg-blue-600','text-white'); resetBtn.click(); });
        modeUpBtn.addEventListener('click', () => { if (mode === 'countup') return; mode = 'countup'; modeUpBtn.classList.add('bg-blue-600','text-white'); modeDownBtn.classList.remove('bg-blue-600','text-white'); baseTime = 0; resetBtn.click(); });
        
        updateDisplay();
    </script>
</body>
</html>
